# ─────────────────────────────────────────────────────
# CI Pipeline: Lint, Type Check, Test
# ─────────────────────────────────────────────────────
# Runs on every push and pull request.
# Ensures code quality and prevents regressions.
# ─────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber python-docx Pillow fpdf2 spacy pydantic pandas polars snowflake-connector-python structlog python-dotenv pytest pytest-cov streamlit

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop on syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on complexity and style issues
          flake8 src/ tests/ --count --max-complexity=10 --max-line-length=120 --statistics --exit-zero

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=70
