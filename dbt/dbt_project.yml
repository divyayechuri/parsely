# ─────────────────────────────────────────────────────
# Parsely dbt Project Configuration
# ─────────────────────────────────────────────────────
# This file tells dbt:
#   - What this project is called
#   - Where to find models, tests, macros, seeds
#   - How to materialize models (view vs table)
#   - Which schema each layer writes to
# ─────────────────────────────────────────────────────

name: 'parsely'
version: '1.0.0'
config-version: 2

profile: 'parsely'

# Where dbt looks for each type of file
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

# Build artifacts go here (gitignored)
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model Configuration ──────────────────────────────
# Controls how each layer is materialized in Snowflake:
#   - staging: views (lightweight, always up-to-date)
#   - intermediate: views (transformation logic only)
#   - marts: tables (materialized for query performance)
models:
  parsely:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: gold
