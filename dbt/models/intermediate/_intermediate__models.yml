version: 2

models:
  - name: int_cleaned_invoices
    description: >
      Invoices with normalized and enriched fields.
      Adds computed columns like payment_terms_days and
      standardizes vendor info for consistent grouping.
    columns:
      - name: document_id
        tests:
          - unique
          - not_null

  - name: int_normalized_vendors
    description: >
      Deduplicated vendor list with standardized names and addresses.
      Uses a deterministic hash of name + address as the vendor_id
      so the same vendor always maps to the same key.
    columns:
      - name: vendor_id
        description: "SHA-256 hash of normalized name + address"
        tests:
          - unique
          - not_null
